name: 'PubTeX'
description: 'A GitHub action to compile and publish LaTeX files to a GitHub repository'
branding:
  icon: file-text
  color: green
inputs:
  deploy_key:
    description: 'Deploy key used to deploy to GitHub repository'
    required: true
  files:
    description: 'Space-separated list of files that should be compiled'
    required: true
  handouts:
    description: 'Space-separated list of Beamer files that handouts should be generated for'
    required: false
    default: ''
  publish_dir:
    description: 'The directory that should be published'
    required: false
    default: dist
  target_repository:
    description: 'Target repository in format owner/repo (e.g., username/my-pdfs)'
    required: true
  target_branch:
    description: 'Target branch to commit PDFs to'
    required: false
    default: main
  target_path:
    description: 'Path within the target repository where PDFs should be copied (e.g., pdfs/lectures)'
    required: false
    default: '.'
  commit_message:
    description: 'Commit message for PDF updates'
    required: false
    default: 'Update compiled PDFs'
  pre_compile_command:
    description: 'Command to run before compiling LaTeX sources'
    required: false
    default: tlmgr update --self && tlmgr update --all
outputs:
  handouts:
    description: "Newline-separated list of file paths to handouts"
    value: ${{ steps.generate-handouts.outputs.handouts }}
runs:
  using: "composite"
  steps:
    - id: generate-handouts
      name: Generate handouts
      run: sudo bash ${{ github.action_path }}/generate_handouts.sh "${{ inputs.handouts }}"
      shell: bash
    - name: Compile LaTeX sources
      uses: xu-cheng/latex-action@4.0.0
      with:
        pre_compile: ${{ inputs.pre_compile_command }}
        root_file: |
          ${{ steps.generate-handouts.outputs.handouts }}
          ${{ inputs.files }}
    - name: Move PDFs
      run: mv ./*.pdf ${{ inputs.publish_dir }}
      shell: bash
    - name: Commit and push PDFs
      run: |
        # Setup SSH key
        mkdir -p ~/.ssh
        echo "${{ inputs.deploy_key }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan github.com >> ~/.ssh/known_hosts
        
        # Configure git
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Clone target repository
        export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
        git clone git@github.com:${{ inputs.target_repository }}.git temp_repo
        cd temp_repo
        
        # Checkout or create target branch
        git checkout ${{ inputs.target_branch }} || git checkout -b ${{ inputs.target_branch }}
        
        # Create target directory if it doesn't exist
        mkdir -p ${{ inputs.target_path }}
        
        # Copy PDFs to target path
        cp -r ../${{ inputs.publish_dir }}/*.pdf ${{ inputs.target_path }}/
        
        # Commit and push
        git add ${{ inputs.target_path }}/*.pdf
        git commit -m "${{ inputs.commit_message }}" || echo "No changes to commit"
        git push origin ${{ inputs.target_branch }}
      shell: bash
